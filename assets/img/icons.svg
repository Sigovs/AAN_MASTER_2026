<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- ==========================================================================
       AAN icon sprite. Style contract: 24x24 grid, 1.5px stroke, round caps and
       joins, no fills (stroke-only line icons; heart-filled is the sole fill —
       the "saved" state), currentColor throughout. Use via:
         <svg class="icon"><use href="assets/img/icons.svg#icon-name"/></svg>
       Stroke presentation lives on each <symbol> so an icon renders correctly
       even without the .icon class; .icon adds sizing + inline alignment.
       New icons MUST match this language — no filled/duotone/emoji icons.
  ========================================================================== -->

  <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10.5" cy="10.5" r="6.5"/><line x1="20" y1="20" x2="15.6" y2="15.6"/>
  </symbol>

  <symbol id="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 7.7C11 5.5 8.1 4.4 5.8 6 3.5 7.6 3.4 11 5.9 13.4L12 19.5l6.1-6.1c2.5-2.4 2.4-5.8.1-7.4C15.9 4.4 13 5.5 12 7.7Z"/>
  </symbol>

  <symbol id="icon-heart-filled" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path fill="currentColor" d="M12 7.7C11 5.5 8.1 4.4 5.8 6 3.5 7.6 3.4 11 5.9 13.4L12 19.5l6.1-6.1c2.5-2.4 2.4-5.8.1-7.4C15.9 4.4 13 5.5 12 7.7Z"/>
  </symbol>

  <symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="12" r="2.5"/><circle cx="17" cy="6" r="2.5"/><circle cx="17" cy="18" r="2.5"/>
    <line x1="8.2" y1="10.8" x2="14.8" y2="7.2"/><line x1="8.2" y1="13.2" x2="14.8" y2="16.8"/>
  </symbol>

  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.5 4.5h3l1.4 3.8-2 1.4a11 11 0 0 0 5.4 5.4l1.4-2 3.8 1.4v3a2 2 0 0 1-2.1 2A15.5 15.5 0 0 1 4.5 6.6a2 2 0 0 1 2-2.1Z"/>
  </symbol>

  <symbol id="icon-message" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.5 5.5h15A1.5 1.5 0 0 1 21 7v8a1.5 1.5 0 0 1-1.5 1.5H9l-4 3.3V16.5A1.5 1.5 0 0 1 3 15V7a1.5 1.5 0 0 1 1.5-1.5Z"/>
  </symbol>

  <symbol id="icon-compare-arrows" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 4v16"/><path d="M5 7l3-3 3 3"/><path d="M16 20V4"/><path d="M13 17l3 3 3-3"/>
  </symbol>

  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
  </symbol>

  <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 9l7 7 7-7"/>
  </symbol>
  <symbol id="icon-chevron-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 15l7-7 7 7"/>
  </symbol>
  <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 5l-7 7 7 7"/>
  </symbol>
  <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 5l7 7-7 7"/>
  </symbol>

  <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="12" x2="19" y2="12"/><path d="M13 6l6 6-6 6"/>
  </symbol>

  <symbol id="icon-percent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>
  </symbol>

  <symbol id="icon-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 5h11v9H2z"/><path d="M13 8h4l4 3.5V14h-8z"/><circle cx="6" cy="16.5" r="1.7"/><circle cx="17" cy="16.5" r="1.7"/>
  </symbol>

  <symbol id="icon-clipboard-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="4" width="14" height="17" rx="1.5"/><rect x="9" y="2.5" width="6" height="3" rx="1"/><path d="M8.5 13l2.2 2.2L15.5 10"/>
  </symbol>

  <symbol id="icon-exchange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9h14"/><path d="M15 6l3 3-3 3"/><path d="M20 15H6"/><path d="M9 12l-3 3 3 3"/>
  </symbol>

  <symbol id="icon-upload-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 18a4 4 0 0 1-.5-7.97A5.5 5.5 0 0 1 17.2 9.6a3.5 3.5 0 0 1 .3 6.9"/><path d="M12 12.5V20"/><path d="M9 15l3-3 3 3"/>
  </symbol>

  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12.5l4.5 4.5L19 7"/>
  </symbol>

  <symbol id="icon-alert-triangle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4.5 21 19H3L12 4.5Z"/><line x1="12" y1="10" x2="12" y2="14"/><path d="M12 16.6v.01"/>
  </symbol>

  <symbol id="icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.5"/><line x1="12" y1="11.5" x2="12" y2="16"/><path d="M12 8v.01"/>
  </symbol>

  <symbol id="icon-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>

  <symbol id="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 5h6v6"/><line x1="19" y1="5" x2="10" y2="14"/><path d="M17 13.5V18a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 5 18V9a1.5 1.5 0 0 1 1.5-1.5H11"/>
  </symbol>

  <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21s6-5.2 6-10.5A6 6 0 0 0 6 10.5C6 15.8 12 21 12 21Z"/><circle cx="12" cy="10.5" r="2.3"/>
  </symbol>

  <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.5"/><path d="M12 7v5l3.4 2"/>
  </symbol>

  <symbol id="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
  </symbol>
</svg>
